<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>App móvil de reportes</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #f4f6f8;
      --card: #ffffff;
      --line: #d9e0e7;
      --text: #22313f;
      --muted: #6b7b8a;
      --primary: #c91717;
      --primary-dark: #a30f0f;
      --secondary: #e9edf2;
      --secondary-text: #22313f;
      --success-bg: #ecfdf5;
      --success-border: #a7f3d0;
      --success-text: #065f46;
      --error-bg: #fef2f2;
      --error-border: #fecaca;
      --error-text: #991b1b;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      --radius: 18px;

      --badge-pendiente-bg: #eef2f6;
      --badge-pendiente-text: #475467;

      --badge-asignada-bg: #eaf3fe;
      --badge-asignada-text: #2f6fb0;

      --badge-proceso-bg: #fef3c7;
      --badge-proceso-text: #92400e;

      --badge-completado-bg: #e8f3ee;
      --badge-completado-text: #2f7d57;

      --badge-cancelado-bg: #fee2e2;
      --badge-cancelado-text: #991b1b;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
    }

    .app {
      max-width: 620px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: linear-gradient(135deg, #c91717, #8f1111);
      color: #fff;
      padding: 24px 18px 20px;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.15);
    }

    .header h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 0.2px;
    }

    .header p {
      margin: 6px 0 0;
      font-size: 13px;
      opacity: 0.96;
      line-height: 1.45;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 14px 16px 0;
    }

    .tab-btn {
      border: none;
      border-radius: 14px;
      padding: 14px 12px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      background: var(--secondary);
      color: var(--secondary-text);
    }

    .tab-btn.active {
      background: var(--primary);
      color: #fff;
    }

    .content {
      padding: 16px;
      flex: 1;
    }

    .section {
      display: none;
    }

    .section.active {
      display: block;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 800;
      color: #0f1720;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid #cfd7df;
      border-radius: 14px;
      padding: 14px 14px;
      font-size: 16px;
      background: #fff;
      color: var(--text);
      outline: none;
      transition: 0.2s ease;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: #c91717;
      box-shadow: 0 0 0 3px rgba(201, 23, 23, 0.12);
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    input[type="file"] {
      padding: 10px;
      background: #fafbfc;
    }

    .preview {
      display: none;
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      background: #fff;
    }

    .preview img {
      display: block;
      width: 100%;
      max-height: 340px;
      object-fit: cover;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }

    button {
      transition: 0.2s ease;
    }

    .btn-primary,
    .btn-secondary,
    .btn-refresh,
    .btn-detail-close {
      border: none;
      border-radius: 14px;
      padding: 15px 16px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
      flex: 1;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    .btn-primary:disabled {
      opacity: 0.75;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: var(--secondary);
      color: #0f1720;
      flex: 1;
    }

    .btn-refresh {
      background: #5b7287;
      color: #fff;
      width: 100%;
    }

    .btn-detail-close {
      background: var(--secondary);
      color: #0f1720;
      width: 100%;
      margin-top: 14px;
    }

    .status {
      display: none;
      margin-top: 16px;
      padding: 14px;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.45;
    }

    .status.ok {
      display: block;
      background: var(--success-bg);
      border: 1px solid var(--success-border);
      color: var(--success-text);
    }

    .status.error {
      display: block;
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      color: var(--error-text);
    }

    .small-note {
      margin-top: 12px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.45;
    }

    .row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .spinner-wrap {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      justify-content: center;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .report-toolbar {
      margin-bottom: 14px;
    }

    .report-list {
      display: grid;
      gap: 12px;
    }

    .report-card {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fff;
      padding: 14px;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.05);
    }

    .report-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .report-code {
      font-size: 12px;
      font-weight: 800;
      color: #7b8b98;
      margin-bottom: 4px;
    }

    .report-title {
      font-size: 16px;
      font-weight: 800;
      color: #182532;
      line-height: 1.35;
    }

    .report-type {
      margin-top: 4px;
      font-size: 12px;
      font-weight: 700;
      color: #6d7b88;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .badge.pendiente {
      background: var(--badge-pendiente-bg);
      color: var(--badge-pendiente-text);
    }

    .badge.asignada {
      background: var(--badge-asignada-bg);
      color: var(--badge-asignada-text);
    }

    .badge.en-proceso {
      background: var(--badge-proceso-bg);
      color: var(--badge-proceso-text);
    }

    .badge.completado {
      background: var(--badge-completado-bg);
      color: var(--badge-completado-text);
    }

    .badge.cancelado {
      background: var(--badge-cancelado-bg);
      color: var(--badge-cancelado-text);
    }

    .report-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .meta-box {
      background: #f8fafc;
      border: 1px solid #e6edf3;
      border-radius: 14px;
      padding: 10px 12px;
    }

    .meta-box span {
      display: block;
      font-size: 11px;
      font-weight: 800;
      color: #7a8b98;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .meta-box strong {
      font-size: 14px;
      color: #1f2e3a;
      line-height: 1.35;
      word-break: break-word;
    }

    .report-actions {
      margin-top: 12px;
      display: flex;
      gap: 10px;
    }

    .btn-view {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 12px;
      font-size: 14px;
      font-weight: 800;
      background: #e9edf2;
      color: #22313f;
      cursor: pointer;
    }

    .empty-state {
      text-align: center;
      padding: 28px 18px;
      color: var(--muted);
      font-weight: 700;
      border: 1px dashed #d7e0e8;
      border-radius: 18px;
      background: #fff;
    }

    .detail-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.48);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 16px;
    }

    .detail-backdrop.open {
      display: flex;
    }

    .detail-modal {
      width: 100%;
      max-width: 640px;
      max-height: 92vh;
      overflow: auto;
      background: #fff;
      border-radius: 22px;
      box-shadow: 0 18px 48px rgba(15, 23, 42, 0.24);
      border: 1px solid var(--line);
    }

    .detail-header {
      padding: 18px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      background: #fff;
      z-index: 2;
    }

    .detail-header h3 {
      margin: 0;
      font-size: 20px;
      color: #1c2c38;
    }

    .detail-body {
      padding: 18px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 14px;
    }

    .detail-item {
      background: #f8fafc;
      border: 1px solid #e7edf3;
      border-radius: 16px;
      padding: 12px;
    }

    .detail-item span {
      display: block;
      font-size: 11px;
      font-weight: 800;
      color: #7a8b98;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .detail-item strong,
    .detail-item p {
      margin: 0;
      font-size: 14px;
      color: #22313f;
      line-height: 1.45;
      word-break: break-word;
    }

    .detail-section {
      margin-top: 14px;
      padding: 14px;
      border: 1px solid #e7edf3;
      border-radius: 18px;
      background: #fff;
    }

    .detail-section h4 {
      margin: 0 0 10px;
      font-size: 15px;
      color: #1d2d39;
    }

    .detail-image-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    .detail-image-box {
      border: 1px solid #e7edf3;
      border-radius: 16px;
      background: #fff;
      min-height: 220px;
      padding: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .detail-image-box img {
      max-width: 100%;
      max-height: 320px;
      width: auto;
      height: auto;
      object-fit: contain;
      display: block;
      border-radius: 10px;
    }

    .history-list {
      display: grid;
      gap: 10px;
    }

    .history-item {
      border: 1px solid #e7edf3;
      border-radius: 14px;
      background: #f9fbfd;
      padding: 12px;
    }

    .history-item strong {
      display: block;
      font-size: 14px;
      margin-bottom: 4px;
      color: #1f2d3a;
    }

    .history-item small {
      display: block;
      color: #7a8b98;
      font-size: 12px;
      margin-bottom: 6px;
      font-weight: 700;
    }

    .history-item p {
      margin: 0;
      color: #475867;
      font-size: 13px;
      line-height: 1.45;
    }

    .chip {
      display: inline-block;
      padding: 7px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 800;
      background: #eef2f6;
      color: #475467;
      margin-right: 6px;
      margin-bottom: 6px;
    }

    .chip.averia {
      background: #eef5fb;
      color: #3f6d98;
    }

    .chip.trabajo {
      background: #eaf3fe;
      color: #2f6fb0;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 520px) {
      .row-2,
      .report-meta,
      .detail-grid {
        grid-template-columns: 1fr;
      }

      .header h1 {
        font-size: 22px;
      }

      input,
      select,
      textarea {
        font-size: 15px;
      }

      .tab-btn {
        font-size: 14px;
      }

      .report-top {
        flex-direction: column;
        align-items: stretch;
      }

      .badge {
        width: fit-content;
      }
    }
  </style>
</head>

          <form id="reporteForm">

                <label for="tipo">Tipo de reporte</label>

                  <option value="Avería">Avería</option>

                  <option value="Alta">Alta</option>
                  <option value="Urgente">Urgente</option>
                </select>
              </div>
            </div>

            <div class="field">
              <label for="agencia">Agencia / Grupo</label>
              <input
                type="text"
                id="agencia"

                required
              />
            </div>

            <div class="field">
              <label for="titulo">Título o asunto</label>
              <input
                type="text"
                id="titulo"
                placeholder="Ej: Máquina POS con fallas"
                required
              />
            </div>

            <div class="field">
              <label for="descripcion">Descripción</label>
              <textarea
                id="descripcion"
                placeholder="Describe aquí la avería o el trabajo requerido..."
                required
              ></textarea>
            </div>

            <div class="field">
              <label for="encargado">Nombre del reportante</label>
              <input
                type="text"
                id="encargado"
                placeholder="Ej: Encargado de agencia"
              />
            </div>

            <div class="field">
              <label for="imagen">Imagen</label>
              <input type="file" id="imagen" accept="image/*" capture="environment" />
              <div class="preview" id="previewContainer">
                <img id="previewImg" alt="Vista previa" />
              </div>
            </div>

            <div class="actions">
              <button type="submit" class="btn-primary" id="btnGuardar">
                Guardar reporte
              </button>
              <button type="button" class="btn-secondary" id="btnLimpiar">
                Limpiar
              </button>
            </div>

            <div id="statusBox" class="status"></div>

            <div class="small-note">
              El reporte se guarda en Supabase y debe reflejarse automáticamente en tu sistema web.
            </div>
          </form>
        </div>
      </section>

      <section class="section" id="sectionReports">
        <div class="card">
          <div class="report-toolbar">
            <button class="btn-refresh" id="btnRefreshReports">Actualizar reportes</button>
          </div>

          <div class="report-list" id="reportList"></div>

          <div class="small-note">
            Aquí se muestran los reportes más recientes con su estado actual.
          </div>
        </div>
      </section>
    </div>
  </div>

  </div>

    function generarCodigo() {

      const m = String(ahora.getMonth() + 1).padStart(2, "0");
      const d = String(ahora.getDate()).padStart(2, "0");
      const h = String(ahora.getHours()).padStart(2, "0");
      const min = String(ahora.getMinutes()).padStart(2, "0");
      const s = String(ahora.getSeconds()).padStart(2, "0");
      return `REP-${y}${m}${d}-${h}${min}${s}`;
    }

    function formatDate(value) {
      if (!value) return "No registrada";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleString("es-DO", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function normalizeStatus(status) {
      const raw = String(status || "Pendiente").trim().toLowerCase();

      if (raw === "pendiente") {
        return { label: "Pendiente", className: "pendiente" };
      }

      if (raw === "asignada" || raw === "asignado") {
        return { label: "Asignada", className: "asignada" };
      }

      if (raw === "en proceso" || raw === "en_proceso" || raw === "proceso") {
        return { label: "En proceso", className: "en-proceso" };
      }

      if (raw === "completado" || raw === "completada") {
        return { label: "Completado", className: "completado" };
      }

      if (raw === "cancelado" || raw === "cancelada" || raw === "rechazada") {
        return { label: status, className: "cancelado" };
      }

      return { label: status || "Pendiente", className: "pendiente" };
    }

    function renderSelectedTypes(selectedTypes, tipoReporte) {

    function crearHistorialInicial({ fechaISO, agenciaTexto, reportante }) {
      return [

            ? `Reporte creado desde app móvil para ${agenciaTexto}`

    async function subirImagen(file) {
      const ext = file.name.split(".").pop()?.toLowerCase() || "jpg";
      const safeExt = ext.replace(/[^a-z0-9]/gi, "") || "jpg";
      const fileName = `reporte_${Date.now()}_${Math.random().toString(36).slice(2)}.${safeExt}`;
      const filePath = `reportes/${fileName}`;

      const { error: uploadError } = await supabase.storage
        .from(BUCKET_NAME)
        .upload(filePath, file, {
          cacheControl: "3600",
          upsert: false,
          contentType: file.type || "image/jpeg"
        });

      if (uploadError) throw uploadError;

      const { data } = supabase.storage.from(BUCKET_NAME).getPublicUrl(filePath);

      if (!data?.publicUrl) {
        throw new Error("No se pudo obtener la URL pública de la imagen.");
      }

      return data.publicUrl;
    }

    imagen.addEventListener("change", () => {
      const file = imagen.files?.[0];

      if (!file) {
        previewContainer.style.display = "none";
        previewImg.src = "";
        return;
      }

      const reader = new FileReader();
      reader.onload = (e) => {
        previewImg.src = e.target.result;
        previewContainer.style.display = "block";
      };
      reader.readAsDataURL(file);
    });

        showStatus("Completa todos los campos obligatorios.", "error");
        return;
      }

      btnGuardar.disabled = true;
      btnGuardar.innerHTML = `
        <span class="spinner-wrap">

          Guardando...

      `;

      try {
        let imagenUrl = null;

        if (imageFile) {
          imagenUrl = await subirImagen(imageFile);

        const now = new Date().toISOString();
        const code = generarCodigo();

        const payload = {
  code: code,
  tipo_reporte: tipoValue,
  categoria: tituloValue,
  descripcion: descripcionValue,

  fecha_reporte: now,

  result_images: [],
  assigned_at: null,

  closed_at: null,
  source: "app_movil",
  history: crearHistorialInicial({

    reportante: encargadoValue
  })
};

        const { error } = await supabase
          .from(TABLE_NAME)
          .insert([payload]);

        if (error) throw error;

        showStatus("Reporte guardado correctamente.", "ok");
        resetForm();
        await loadReports();

    async function cambiarEstadoTecnico(report, nuevoEstado) {
  const history = Array.isArray(report.history) ? [...report.history] : [];

  history.push({
    action: "Estado",
    date: new Date().toISOString(),
    user: usuarioActual?.user || "tecnico",
    detail: `Estado cambiado a ${nuevoEstado}`,
    source: "app_movil"
  });

  const payload = {
    estado: nuevoEstado,
    history: history,
    started_at: nuevoEstado === "En proceso"
      ? (report.started_at || new Date().toISOString())
      : report.started_at
  };

  const { error } = await supabase
    .from(TABLE_NAME)
    .update(payload)
    .eq("id", report.id);

  if (error) {
    alert("No se pudo actualizar el estado.");
    console.error(error);
    return;
  }

  await loadReports();
}

    async function guardarGestionTecnica(report) {
  const techStatus = document.getElementById("techStatus")?.value || "En proceso";
  const techDescription = document.getElementById("techDescription")?.value?.trim() || "";
  const evidenceFiles = Array.from(document.getElementById("techEvidence")?.files || []);

  const currentResultImages = Array.isArray(report.result_images) ? [...report.result_images] : [];
  let nuevasEvidencias = [];

  if (evidenceFiles.length) {
    for (const file of evidenceFiles) {
      const imageUrl = await subirImagen(file);
      nuevasEvidencias.push(imageUrl);
    }
  }

  const resultImagesFinal = currentResultImages.concat(nuevasEvidencias);

  if (techStatus === "Completado") {
    if (!techDescription) {
      alert("Debes escribir la descripción técnica antes de completar.");
      return;
    }

    if (!resultImagesFinal.length) {
      alert("Debes subir al menos una evidencia antes de completar.");
      return;
    }
  }

  const history = Array.isArray(report.history) ? [...report.history] : [];

  if (nuevasEvidencias.length) {
    history.push({
      action: "Evidencia",
      date: new Date().toISOString(),
      user: usuarioActual?.user || "tecnico",
      detail: `${nuevasEvidencias.length} evidencia(s) agregada(s)`,
      source: "app_movil"
    });
  }

  if ((report.estado || "") !== techStatus) {
    history.push({
      action: techStatus === "Completado" ? "Finalización" : "Estado",
      date: new Date().toISOString(),
      user: usuarioActual?.user || "tecnico",
      detail: techStatus === "Completado"
        ? "Operación completada desde app móvil"
        : `Estado cambiado a ${techStatus}`,
      source: "app_movil"
    });
  }

  const payload = {
    estado: techStatus,
    descripcion_tecnica: techDescription,
    result_images: resultImagesFinal,
    history: history,
    started_at: techStatus === "En proceso"
      ? (report.started_at || new Date().toISOString())
      : report.started_at,
    completed_at: techStatus === "Completado"
      ? new Date().toISOString()
      : report.completed_at,
    closed_at: techStatus === "Completado"
      ? new Date().toISOString()
      : report.closed_at
  };

  const { error } = await supabase
    .from(TABLE_NAME)
    .update(payload)
    .eq("id", report.id);

  if (error) {
    alert("No se pudo guardar la actualización técnica.");
    console.error(error);
    return;
  }

  closeDetail();
  await loadReports();
}
