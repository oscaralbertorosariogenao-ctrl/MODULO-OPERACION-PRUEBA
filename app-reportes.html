<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Reportes de Operaciones</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }

    .app {
      max-width: 520px;
      margin: 0 auto;
      min-height: 100vh;
      background: #ffffff;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: linear-gradient(135deg, #b91c1c, #7f1d1d);
      color: #fff;
      padding: 22px 16px 18px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.12);
    }

    .header h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 0.2px;
    }

    .header p {
      margin: 6px 0 0;
      font-size: 13px;
      opacity: 0.95;
    }

    .content {
      padding: 16px;
      flex: 1;
    }

    .card {
      background: #fff;
      border-radius: 18px;
      padding: 16px;
      border: 1px solid #e5e7eb;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.06);
    }

    .field {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 700;
      color: #111827;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 13px 14px;
      font-size: 15px;
      background: #fff;
      outline: none;
      transition: 0.2s ease;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: #b91c1c;
      box-shadow: 0 0 0 3px rgba(185, 28, 28, 0.10);
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    input[type="file"] {
      background: #f9fafb;
      padding: 10px;
    }

    .preview {
      display: none;
      margin-top: 10px;
    }

    .preview img {
      width: 100%;
      max-height: 260px;
      object-fit: cover;
      border-radius: 14px;
      border: 1px solid #e5e7eb;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 18px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      flex: 1;
    }

    .btn-primary {
      background: #b91c1c;
      color: #fff;
    }

    .btn-primary:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .status {
      display: none;
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
    }

    .status.ok {
      display: block;
      background: #ecfdf5;
      color: #065f46;
      border: 1px solid #a7f3d0;
    }

    .status.error {
      display: block;
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    .small-note {
      margin-top: 14px;
      font-size: 12px;
      color: #6b7280;
      text-align: center;
      line-height: 1.5;
    }

    .loading-text {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .spinner {
      width: 15px;
      height: 15px;
      border: 2px solid rgba(255,255,255,0.45);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>Nuevo reporte</h1>
      <p>Registrar averías y trabajos desde el celular</p>
    </div>

    <div class="content">
      <div class="card">
        <form id="reporteForm">
          <div class="field">
            <label for="tipo">Tipo de reporte</label>
            <select id="tipo" required>
              <option value="">Seleccionar</option>
              <option value="Avería">Avería</option>
              <option value="Trabajo">Trabajo</option>
            </select>
          </div>

          <div class="field">
            <label for="agencia">Agencia / Grupo</label>
            <input type="text" id="agencia" placeholder="Ej: Agencia 0335 / Grupo 06" />
          </div>

          <div class="field">
            <label for="titulo">Título o asunto</label>
            <input type="text" id="titulo" placeholder="Ej: Printer no enciende" required />
          </div>

          <div class="field">
            <label for="descripcion">Descripción</label>
            <textarea id="descripcion" placeholder="Describe aquí la avería o el trabajo requerido..." required></textarea>
          </div>

          <div class="field">
            <label for="imagen">Imagen</label>
            <input type="file" id="imagen" accept="image/*" capture="environment" />
            <div class="preview" id="previewContainer">
              <img id="previewImg" alt="Vista previa de imagen" />
            </div>
          </div>

          <div class="actions">
            <button type="submit" class="btn-primary" id="btnGuardar">Guardar reporte</button>
            <button type="button" class="btn-secondary" id="btnLimpiar">Limpiar</button>
          </div>

          <div id="statusBox" class="status"></div>
          <div class="small-note">
            El reporte se guarda en Supabase y debe reflejarse automáticamente en tu sistema web.
          </div>
        </form>
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const SUPABASE_URL = "https://cvmkfzagrtwygmwsqomb.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2bWtmemFncnR3eWdtd3Nxb21iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3OTc2NDEsImV4cCI6MjA4ODM3MzY0MX0.YQ1tjN6F1Rb-rsJl10A1NCrTxgNrDoxxqa57E67Zhw0";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form = document.getElementById("reporteForm");
    const tipo = document.getElementById("tipo");
    const agencia = document.getElementById("agencia");
    const titulo = document.getElementById("titulo");
    const descripcion = document.getElementById("descripcion");
    const imagen = document.getElementById("imagen");
    const previewContainer = document.getElementById("previewContainer");
    const previewImg = document.getElementById("previewImg");
    const btnGuardar = document.getElementById("btnGuardar");
    const btnLimpiar = document.getElementById("btnLimpiar");
    const statusBox = document.getElementById("statusBox");

    function showStatus(message, type = "ok") {
      statusBox.className = "status " + type;
      statusBox.textContent = message;
    }

    function clearStatus() {
      statusBox.className = "status";
      statusBox.textContent = "";
    }

    function resetForm() {
      form.reset();
      previewContainer.style.display = "none";
      previewImg.src = "";
      clearStatus();
    }

    imagen.addEventListener("change", () => {
      const file = imagen.files?.[0];
      if (!file) {
        previewContainer.style.display = "none";
        previewImg.src = "";
        return;
      }

      const reader = new FileReader();
      reader.onload = (e) => {
        previewImg.src = e.target.result;
        previewContainer.style.display = "block";
      };
      reader.readAsDataURL(file);
    });

    btnLimpiar.addEventListener("click", resetForm);

    async function subirImagen(file) {
      const extension = file.name.split(".").pop()?.toLowerCase() || "jpg";
      const fileName = `reporte_${Date.now()}_${Math.random().toString(36).slice(2)}.${extension}`;
      const filePath = `reportes/${fileName}`;

      const { error: uploadError } = await supabase
        .storage
        .from("reportes-operaciones")
        .upload(filePath, file, {
          cacheControl: "3600",
          upsert: false,
          contentType: file.type
        });

      if (uploadError) throw uploadError;

      const { data } = supabase
        .storage
        .from("reportes-operaciones")
        .getPublicUrl(filePath);

      return data.publicUrl;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      clearStatus();

      const tipoValue = tipo.value.trim();
      const agenciaValue = agencia.value.trim();
      const tituloValue = titulo.value.trim();
      const descripcionValue = descripcion.value.trim();
      const imageFile = imagen.files?.[0] || null;

      if (!tipoValue || !tituloValue || !descripcionValue) {
        showStatus("Completa todos los campos obligatorios.", "error");
        return;
      }

      btnGuardar.disabled = true;
      btnGuardar.innerHTML = '<span class="loading-text"><span class="spinner"></span>Guardando...</span>';

      try {
        let imagenUrl = null;

        if (imageFile) {
          imagenUrl = await subirImagen(imageFile);
        }

        const now = new Date().toISOString();

        const payload = {
          code: "REP-" + Date.now(),
          type: tipoValue,
          description: tituloValue + " - " + descripcionValue,
          status: "Pendiente",
          technician: null,
          selected_types: [],
          images: imagenUrl ? [imagenUrl] : [],
          result_images: [],
          assigned_at: null,
          started_at: null,
          completed_at: null,
          resolution_time: null,
          closed_at: null,
          source: "app_movil",
          history: [
            {
              action: "Creado desde app móvil",
              date: now,
              detail: agenciaValue ? "Ubicación: " + agenciaValue : "Sin ubicación especificada"
            }
          ]
        };

        const { error } = await supabase
          .from("reportes_operaciones")
          .insert([payload]);

        if (error) throw error;

        showStatus("Reporte guardado correctamente.", "ok");
        resetForm();
      } catch (err) {
        console.error("Error guardando reporte:", err);
        showStatus("Error al guardar el reporte: " + (err.message || "desconocido"), "error");
      } finally {
        btnGuardar.disabled = false;
        btnGuardar.textContent = "Guardar reporte";
      }
    });
  </script>
</body>
</html>
